r-nav"><div class="mr-auto navbar-nav"><a href="/comparison-note/algorithm" data-rb-event-key="/algorithm" class="nav-link">算法</a><a href="/comparison-note/basic-concept" data-rb-event-key="/basic-concept" class="nav-link">基础概念</a><a href="/comparison-note/data-type" data-rb-event-key="/data-type" class="nav-link">数据类型</a><a href="/comparison-note/function" data-rb-event-key="/function" class="nav-link">函数和方法</a></div></div></nav><div style="padding-top:12px;padding-bottom:12px" class="container-fluid"><h1>函数和方法</h1><div style="margin-bottom:12px"><div class="markdown-body"></div></div><div style="margin-bottom:12px" class="justify-content-md-center row"><div class="col-md-auto"><div role="toolbar" class="btn-toolbar"><div role="group" class="btn-group btn-group-sm btn-group-toggle"><label class="btn btn-secondary"><input type="checkbox" value="go" autoComplete="off"/>go</label></div></div></div></div><div class="card-group"></div></div><div style="text-align:center;padding:12px 0;font-size:14px">v<!-- -->0.1.0<!-- --> <a href="https://github.com/fishjar/comparison-note" title="访问github源码">github</a></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"nav":{"name":"function","fullPath":"/function","asPath":"/function","id":"%2Ffunction","parent":{},"readme":{"title":"函数和方法","fullPath":"/function/README.md"},"cards":[{"name":"go.md","baseName":"go","extName":".md","fullPath":"/function/go.md"}],"nodes":[]},"content":"","cards":[{"name":"go.md","baseName":"go","extName":".md","fullPath":"/function/go.md","content":"```go\npackage main\n\nimport \"fmt\"\n\nfunc add(x int, y int) int {\n\treturn x + y\n}\n\nfunc main() {\n\tfmt.Println(add(42, 13))\n}\n```\n\n当连续两个或多个函数的已命名形参类型相同时，除最后一个类型以外，其它都可以省略。\n\n```go\npackage main\n\nimport \"fmt\"\n\nfunc add(x, y int) int {\n\treturn x + y\n}\n\nfunc main() {\n\tfmt.Println(add(42, 13))\n}\n```\n\n函数可以返回任意数量的返回值。\n\n```go\npackage main\n\nimport \"fmt\"\n\nfunc swap(x, y string) (string, string) {\n\treturn y, x\n}\n\nfunc main() {\n\ta, b := swap(\"hello\", \"world\")\n\tfmt.Println(a, b)\n}\n```\n\n### 命名返回值\n\nGo 的返回值可被命名，它们会被视作定义在函数顶部的变量。\n\n返回值的名称应当具有一定的意义，它可以作为文档使用。\n\n没有参数的 return 语句返回已命名的返回值。也就是 直接 返回。\n\n直接返回语句应当仅用在下面这样的短函数中。在长的函数中它们会影响代码的可读性。\n\n```go\npackage main\n\nimport \"fmt\"\n\nfunc split(sum int) (x, y int) {\n\tx = sum * 4 / 9\n\ty = sum - x\n\treturn\n}\n\nfunc main() {\n\tfmt.Println(split(17))\n}\n```\n"}]}},"page":"/[...param]","query":{"param":["function"]},"buildId":"RObeKJT4O3UiGUggjQU3r","assetPrefix":"/comparison-note","nextExport":true,"isFallback":false,"gip":true}</script><script nomodule="" src="/comparison-note/_next/static/chunks/polyfills-7258ef49cf482e03ae9c.js"></script><script src="/comparison-note/_next/static/chunks/main-ef5a94dd87cceb069c5d.js" async=""></script><script src="/comparison-note/_next/static/chunks/webpack-e067438c4cf4ef2ef178.js" async=""></script><script src="/comparison-note/_next/static/chunks/framework.c7b20b4e446c7cca89e7.js" async=""></script><script src="/comparison-note/_next/static/chunks/468453da.ff5578978733a40a67a3.js" async=""></script><script src="/comparison-note/_next/static/chunks/commons.f60438d04fdb9e3a3273.js" async=""></script><script src="/comparison-note/_next/static/chunks/pages/_app-6bb4573f786228c7e781.js" async=""></script><script src="/comparison-note/_next/static/chunks/a1bc03cf.64f9f8493143216945e6.js" async=""></script><script src="/comparison-note/_next/static/chunks/4d6c67b811e74d3ca6630b1db854b02fef4ff3ce.aab3b7e29e09bf292d7c.js" async=""></script><script src="/comparison-note/_next/static/chunks/pages/%5B...param%5D-b75bc40f77a90a8fa502.js" async=""></script><script src="/comparison-note/_next/static/RObeKJT4O3UiGUggjQU3r/_buildManifest.js" async=""></script><script src="/comparison-note/_next/static/RObeKJT4O3UiGUggjQU3r/_ssgManifest.js" async=""></script></body></html>
