相关的程序通常都是每种电脑编程语言最基本、最简单的程序，也会用作示范一个编程语言如何运作。

elloword/js.md"},{"name":"python.md","baseName":"python","extName":".md","fullPath":"/basic-concept/helloword/python.md"}],"nodes":[]},"content":"\n`Hello, World`是指在电脑屏幕显示“Hello, World!”（你好，世界！）字符串的计算机程序。\n相关的程序通常都是每种电脑编程语言最基本、最简单的程序，也会用作示范一个编程语言如何运作。\n同时它亦可以用来确认一个编程语言的编译器、程序开发环境及运行环境是否已经安装妥当。\n因为写法简单可见，这也是很多初学者首次接触编程语言时会撰写的程序。\n","cards":[{"name":"b.md","baseName":"b","extName":".md","fullPath":"/basic-concept/helloword/b.md","content":"于1972年，贝尔实验室成员布莱恩·柯林汉撰写的内部技术文件《A Tutorial Introduction to the Language B》\n首次提到了`Hello World`这字符串。\n当时，他使用B语言撰写了第一个使用参数的`Hello World`相关程序：\n\n```b\nmain(){\n  extrn a,b,c;\n  putchar(a); putchar(b); putchar(c); putchar('!*n');\n  }\n\na 'hell';\nb 'o, w';\nc 'orld';\n```"},{"name":"c.md","baseName":"c","extName":".md","fullPath":"/basic-concept/helloword/c.md","content":"```c\n#include \u003cstdio.h\u003e\n\nmain( )\n{\n    printf(\"hello, world\\n\");\n}\n```\n"},{"name":"dart.md","baseName":"dart","extName":".md","fullPath":"/basic-concept/helloword/dart.md","content":"```dart\n// helloword.dart\n// 定义个方法。\nprintNumber(num aNumber) {\n  print('The number is $aNumber.'); // 在控制台打印内容。\n}\n\n// 这是程序执行的入口。\n// 每个应用都需要有个顶级的 main() 入口方法才能执行。\n// main() 方法的返回值为 void 并且有个可选的 List\u003cString\u003e 参数。\nmain() {\n  var number = 42; // 定义并初始化一个变量。\n  printNumber(number); // 调用一个方法。\n}\n```\n\n```sh\ndart helloword.dart\n```\n"},{"name":"go.md","baseName":"go","extName":".md","fullPath":"/basic-concept/helloword/go.md","content":"```go\n// helloword.1.go\npackage main\nimport \"fmt\"\nfunc main() {\n  fmt.Println(\"Hello, world\")\n}\n```\n\n```go\n// helloword.2.go\npackage main\nimport (\n  \"fmt\"\n  \"time\"\n)\nfunc main() {\n  fmt.Println(\"Welcome to the playground!\")\n  fmt.Println(\"The time is\", time.Now())\n}\n```\n\n```sh\ngo run helloword.go\n```\n"},{"name":"js.md","baseName":"js","extName":".md","fullPath":"/basic-concept/helloword/js.md","content":"```js\n// helloword.js\nconsole.log(\"Hello, world\");\n```\n\n```sh\nnode helloword.js\n```\n"},{"name":"python.md","baseName":"python","extName":".md","fullPath":"/basic-concept/helloword/python.md","content":"```python\n# helloword.py\nprint('hello, world')\n```\n\n```sh\npython helloword.py\n```\n"}]}},"page":"/[...param]","query":{"param":["basic-concept","helloword"]},"buildId":"RObeKJT4O3UiGUggjQU3r","assetPrefix":"/comparison-note","nextExport":true,"isFallback":false,"gip":true}</script><script nomodule="" src="/comparison-note/_next/static/chunks/polyfills-7258ef49cf482e03ae9c.js"></script><script src="/comparison-note/_next/static/chunks/main-ef5a94dd87cceb069c5d.js" async=""></script><script src="/comparison-note/_next/static/chunks/webpack-e067438c4cf4ef2ef178.js" async=""></script><script src="/comparison-note/_next/static/chunks/framework.c7b20b4e446c7cca89e7.js" async=""></script><script src="/comparison-note/_next/static/chunks/468453da.ff5578978733a40a67a3.js" async=""></script><script src="/comparison-note/_next/static/chunks/commons.f60438d04fdb9e3a3273.js" async=""></script><script src="/comparison-note/_next/static/chunks/pages/_app-6bb4573f786228c7e781.js" async=""></script><script src="/comparison-note/_next/static/chunks/a1bc03cf.64f9f8493143216945e6.js" async=""></script><script src="/comparison-note/_next/static/chunks/4d6c67b811e74d3ca6630b1db854b02fef4ff3ce.aab3b7e29e09bf292d7c.js" async=""></script><script src="/comparison-note/_next/static/chunks/pages/%5B...param%5D-b75bc40f77a90a8fa502.js" async=""></script><script src="/comparison-note/_next/static/RObeKJT4O3UiGUggjQU3r/_buildManifest.js" async=""></script><script src="/comparison-note/_next/static/RObeKJT4O3UiGUggjQU3r/_ssgManifest.js" async=""></script></body></html>
