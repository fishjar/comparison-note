nav"><div class="mr-auto navbar-nav"><a href="/comparison-note/algorithm" data-rb-event-key="/algorithm" class="nav-link">算法</a><a href="/comparison-note/basic-concept" data-rb-event-key="/basic-concept" class="nav-link">基础概念</a><a href="/comparison-note/data-type" data-rb-event-key="/data-type" class="nav-link">数据类型</a><a href="/comparison-note/function" data-rb-event-key="/function" class="nav-link">函数和方法</a></div></div></nav><div style="padding-top:12px;padding-bottom:12px" class="container-fluid"><h1>结构体</h1><div style="margin-bottom:12px"><div class="markdown-body"></div></div><div style="margin-bottom:12px" class="justify-content-md-center row"><div class="col-md-auto"><div role="toolbar" class="btn-toolbar"><div role="group" class="btn-group btn-group-sm btn-group-toggle"><label class="btn btn-secondary"><input type="checkbox" value="go" autoComplete="off"/>go</label></div></div></div></div><div class="card-group"></div></div><div style="text-align:center;padding:12px 0;font-size:14px">v<!-- -->0.1.0<!-- --> <a href="https://github.com/fishjar/comparison-note" title="访问github源码">github</a></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"nav":{"name":"struct","fullPath":"/data-type/struct","asPath":"/data-type/struct","id":"%2Fdata-type%2Fstruct","parent":{"name":"data-type","fullPath":"/data-type","asPath":"/data-type","id":"%2Fdata-type","readme":{"title":"数据类型","fullPath":"/data-type/README.md"}},"readme":{"title":"结构体","fullPath":"/data-type/struct/README.md"},"cards":[{"name":"go.md","baseName":"go","extName":".md","fullPath":"/data-type/struct/go.md"}],"nodes":[]},"content":"","cards":[{"name":"go.md","baseName":"go","extName":".md","fullPath":"/data-type/struct/go.md","content":"```go\ntype Employee struct {\n    ID        int\n    Name      string\n    Address   string\n    DoB       time.Time\n    Position  string\n    Salary    int\n    ManagerID int\n}\nvar dilbert Employee\n\nvar employeeOfTheMonth *Employee = \u0026dilbert\nemployeeOfTheMonth.Position += \" (proactive team player)\" // 相当于下一行\n(*employeeOfTheMonth).Position += \" (proactive team player)\"\n\n// 如果要在函数内部修改结构体成员的话，用指针传入是必须的\nfunc AwardAnnualRaise(e *Employee) {\n    e.Salary = e.Salary * 105 / 100\n}\n\npp := \u0026Point{1, 2} // 等价于下面两行\npp := new(Point)\n*pp = Point{1, 2}\n```\n\n一个命名为 S 的结构体类型将不能再包含 S 类型的成员：\n因为一个聚合的值不能包含它自身。\n（该限制同样适应于数组。）\n但是 S 类型的结构体可以包含\\*S 指针类型的成员，\n这可以让我们创建递归的数据结构，比如链表和树结构等。\n\n```go\ntype tree struct {\n    value       int\n    left, right *tree\n}\n```\n\n如果结构体的全部成员都是可以比较的，那么结构体也是可以比较的。\n因此和其他可比较的类型一样，可以用于 map 的 key 类型\n\n```go\ntype Point struct{ X, Y int }\n\np := Point{1, 2}\nq := Point{2, 1}\nfmt.Println(p.X == q.X \u0026\u0026 p.Y == q.Y) // \"false\"\nfmt.Println(p == q)                   // \"false\"\n```\n\nGo 语言有一个特性让我们只声明一个成员对应的数据类型而不指名成员的名字；\n这类成员就叫匿名成员。\n匿名成员的数据类型必须是命名的类型或指向一个命名的类型的指针。\n\n```go\ntype Point struct {\n    X, Y int\n}\ntype Circle struct {\n    Center Point\n    Radius int\n}\ntype Wheel struct {\n    Circle Circle\n    Spokes int\n}\nvar w Wheel\nw.Circle.Center.X = 8\nw.Circle.Center.Y = 8\nw.Circle.Radius = 5\nw.Spokes = 20\n\n// 下面的代码中，Circle和Wheel各自都有一个匿名成员。\n// 我们可以说Point类型被嵌入到了Circle结构体，\n// 同时Circle类型被嵌入到了Wheel结构体。\ntype Circle struct {\n    Point\n    Radius int\n}\ntype Wheel struct {\n    Circle\n    Spokes int\n}\n\n// 匿名成员Circle和Point都有自己的名字——就是命名的类型名字\n// 但是这些名字在点操作符中是可选的。\nvar w Wheel\nw.X = 8            // equivalent to w.Circle.Point.X = 8\nw.Y = 8            // equivalent to w.Circle.Point.Y = 8\nw.Radius = 5       // equivalent to w.Circle.Radius = 5\nw.Spokes = 20\n\n// 不幸的是，结构体字面值并没有简短表示匿名成员的语法，\n// 因此下面的语句都不能编译通过：\nw = Wheel{8, 8, 5, 20}                       // compile error: unknown fields\nw = Wheel{X: 8, Y: 8, Radius: 5, Spokes: 20} // compile error: unknown fields\n\n// 结构体字面值必须遵循形状类型声明时的结构，所以我们只能用下面的两种语法\nw = Wheel{Circle{Point{8, 8}, 5}, 20}\nw = Wheel{\n    Circle: Circle{\n        Point:  Point{X: 8, Y: 8},\n        Radius: 5,\n    },\n    Spokes: 20, // NOTE: trailing comma necessary here (and at Radius)\n}\nfmt.Printf(\"%#v\\n\", w)\n// Output:\n// Wheel{Circle:Circle{Point:Point{X:8, Y:8}, Radius:5}, Spokes:20}\nw.X = 42\nfmt.Printf(\"%#v\\n\", w)\n// Output:\n// Wheel{Circle:Circle{Point:Point{X:42, Y:8}, Radius:5}, Spokes:20}\n```\n\n一个 struct 类型也可能会有多个匿名字段。\n\n种类型的值便会拥有 Point 和 RGBA 类型的所有方法，\n以及直接定义在 ColoredPoint 中的方法。\n当编译器解析一个选择器到方法时，比如 p.ScaleBy，\n它会首先去找直接定义在这个类型里的 ScaleBy 方法，\n然后找被 ColoredPoint 的内嵌字段们引入的方法，\n然后去找 Point 和 RGBA 的内嵌字段引入的方法，然后一直递归向下找。\n如果选择器有二义性的话编译器会报错，比如你在同一级里有两个同名的方法。\n\n```go\ntype ColoredPoint struct {\n    Point\n    color.RGBA\n}\n```\n\n一个小 trick\n\n```go\nvar (\n    mu sync.Mutex // guards mapping\n    mapping = make(map[string]string)\n)\n\nfunc Lookup(key string) string {\n    mu.Lock()\n    v := mapping[key]\n    mu.Unlock()\n    return v\n}\n```\n\n改进后\n\n```go\n// 给新的变量起了一个更具表达性的名字：cache\n// 因为sync.Mutex字段也被嵌入到了这个struct里，\n// 其Lock和Unlock方法也就都被引入到了这个匿名结构中了\nvar cache = struct {\n    sync.Mutex\n    mapping map[string]string\n}{\n    mapping: make(map[string]string),\n}\n\n\nfunc Lookup(key string) string {\n    cache.Lock()\n    v := cache.mapping[key]\n    cache.Unlock()\n    return v\n}\n```\n\n将一个 Go 语言中类似 movies 的结构体 slice 转为 JSON 的过程叫编组（marshaling）。\n编组通过调用 json.Marshal 函数完成\n\n```go\n// Color成员的Tag还带了一个额外的omitempty选项，\n// 表示当Go语言结构体成员为空或零值时不生成JSON对象（这里false为零值）。\ntype Movie struct {\n    Title  string\n    Year   int  `json:\"released\"`\n    Color  bool `json:\"color,omitempty\"`\n    Actors []string\n}\nvar movies = []Movie{\n    {Title: \"Casablanca\", Year: 1942, Color: false,\n        Actors: []string{\"Humphrey Bogart\", \"Ingrid Bergman\"}},\n    {Title: \"Cool Hand Luke\", Year: 1967, Color: true,\n        Actors: []string{\"Paul Newman\"}},\n    {Title: \"Bullitt\", Year: 1968, Color: true,\n        Actors: []string{\"Steve McQueen\", \"Jacqueline Bisset\"}},\n    // ...\n}\ndata, err := json.Marshal(movies)\nif err != nil {\n    log.Fatalf(\"JSON marshaling failed: %s\", err)\n}\nfmt.Printf(\"%s\\n\", data)\n\n```\n\n```json\n[{\"Title\":\"Casablanca\",\"released\":1942,\"Actors\":[\"Humphrey Bogart\",\"Ingr\nid Bergman\"]},{\"Title\":\"Cool Hand Luke\",\"released\":1967,\"color\":true,\"Ac\ntors\":[\"Paul Newman\"]},{\"Title\":\"Bullitt\",\"released\":1968,\"color\":true,\"\nActors\":[\"Steve McQueen\",\"Jacqueline Bisset\"]}]\n```\n\n```go\n// json.MarshalIndent函数将产生整齐缩进的输出\ndata, err := json.MarshalIndent(movies, \"\", \"    \")\nif err != nil {\n    log.Fatalf(\"JSON marshaling failed: %s\", err)\n}\nfmt.Printf(\"%s\\n\", data)\n```\n\n```json\n[\n  {\n    \"Title\": \"Casablanca\",\n    \"released\": 1942,\n    \"Actors\": [\"Humphrey Bogart\", \"Ingrid Bergman\"]\n  },\n  {\n    \"Title\": \"Cool Hand Luke\",\n    \"released\": 1967,\n    \"color\": true,\n    \"Actors\": [\"Paul Newman\"]\n  },\n  {\n    \"Title\": \"Bullitt\",\n    \"released\": 1968,\n    \"color\": true,\n    \"Actors\": [\"Steve McQueen\", \"Jacqueline Bisset\"]\n  }\n]\n```\n\n编码的逆操作是解码，对应将 JSON 数据解码为 Go 语言的数据结构，\nGo 语言中一般叫 unmarshaling，通过 json.Unmarshal 函数完成。\n\n```go\nvar titles []struct{ Title string }\nif err := json.Unmarshal(data, \u0026titles); err != nil {\n    log.Fatalf(\"JSON unmarshaling failed: %s\", err)\n}\nfmt.Println(titles) // \"[{Casablanca} {Cool Hand Luke} {Bullitt}]\"\n```\n"}]}},"page":"/[...param]","query":{"param":["data-type","struct"]},"buildId":"RObeKJT4O3UiGUggjQU3r","assetPrefix":"/comparison-note","nextExport":true,"isFallback":false,"gip":true}</script><script nomodule="" src="/comparison-note/_next/static/chunks/polyfills-7258ef49cf482e03ae9c.js"></script><script src="/comparison-note/_next/static/chunks/main-ef5a94dd87cceb069c5d.js" async=""></script><script src="/comparison-note/_next/static/chunks/webpack-e067438c4cf4ef2ef178.js" async=""></script><script src="/comparison-note/_next/static/chunks/framework.c7b20b4e446c7cca89e7.js" async=""></script><script src="/comparison-note/
