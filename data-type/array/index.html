vbar-nav"><div class="mr-auto navbar-nav"><a href="/comparison-note/algorithm" data-rb-event-key="/algorithm" class="nav-link">算法</a><a href="/comparison-note/basic-concept" data-rb-event-key="/basic-concept" class="nav-link">基础概念</a><a href="/comparison-note/data-type" data-rb-event-key="/data-type" class="nav-link">数据类型</a><a href="/comparison-note/function" data-rb-event-key="/function" class="nav-link">函数和方法</a></div></div></nav><div style="padding-top:12px;padding-bottom:12px" class="container-fluid"><h1>数组/列表/切片</h1><div style="margin-bottom:12px"><div class="markdown-body"></div></div><div style="margin-bottom:12px" class="justify-content-md-center row"><div class="col-md-auto"><div role="toolbar" class="btn-toolbar"><div role="group" class="btn-group btn-group-sm btn-group-toggle"><label class="btn btn-secondary"><input type="checkbox" value="go" autoComplete="off"/>go</label></div></div></div></div><div class="card-group"></div></div><div style="text-align:center;padding:12px 0;font-size:14px">v<!-- -->0.1.0<!-- --> <a href="https://github.com/fishjar/comparison-note" title="访问github源码">github</a></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"nav":{"name":"array","fullPath":"/data-type/array","asPath":"/data-type/array","id":"%2Fdata-type%2Farray","parent":{"name":"data-type","fullPath":"/data-type","asPath":"/data-type","id":"%2Fdata-type","readme":{"title":"数据类型","fullPath":"/data-type/README.md"}},"readme":{"title":"数组/列表/切片","fullPath":"/data-type/array/README.md"},"cards":[{"name":"go.md","baseName":"go","extName":".md","fullPath":"/data-type/array/go.md"}],"nodes":[]},"content":"","cards":[{"name":"go.md","baseName":"go","extName":".md","fullPath":"/data-type/array/go.md","content":"翻转切片\n\n```go\n// 复制一个slice只是对底层的数组创建了一个新的slice别名\n// 向函数传递slice将允许在函数内部修改底层数组\nfunc reverse(s []int) {\n    for i, j := 0, len(s)-1; i \u003c j; i, j = i+1, j-1 {\n        s[i], s[j] = s[j], s[i]\n    }\n}\n\na := [...]int{0, 1, 2, 3, 4, 5}\nreverse(a[:])\nfmt.Println(a) // \"[5 4 3 2 1 0]\"\n\n// 一种将slice元素循环向左旋转n个元素的方法是三次调用reverse反转函数\n// 第一次是反转开头的n个元素，然后是反转剩下的元素，最后是反转整个slice的元素。\n// 如果是向右循环旋转，则将第三个函数调用移到第一个调用位置就可以了。\ns := []int{0, 1, 2, 3, 4, 5}\nreverse(s[:2])\nreverse(s[2:])\nreverse(s)\nfmt.Println(s) // \"[2 3 4 5 0 1]\"\n```\n\n过滤空字符串\n\n```go\nfunc nonempty(strings []string) []string {\n    i := 0\n    for _, s := range strings {\n        if s != \"\" {\n            strings[i] = s\n            i++\n        }\n    }\n    return strings[:i]\n}\n\ndata := []string{\"one\", \"\", \"three\"}\nfmt.Printf(\"%q\\n\", nonempty(data)) // `[\"one\" \"three\"]`\nfmt.Printf(\"%q\\n\", data)           // `[\"one\" \"three\" \"three\"]`\n\nfunc nonempty2(strings []string) []string {\n    out := strings[:0] // zero-length slice of original\n    for _, s := range strings {\n        if s != \"\" {\n            out = append(out, s)\n        }\n    }\n    return out\n}\n```\n\n模拟栈（stack）\n\n```go\nstack = append(stack, v) // push v\ntop := stack[len(stack)-1] // top of stack\nstack = stack[:len(stack)-1] // pop\n```\n\n删除 slice 中间的某个元素并保存原有的元素顺序\n\n```go\nfunc remove(slice []int, i int) []int {\n    copy(slice[i:], slice[i+1:])\n    return slice[:len(slice)-1]\n}\nfunc main() {\n    s := []int{5, 6, 7, 8, 9}\n    fmt.Println(remove(s, 2)) // \"[5 6 8 9]\"\n}\n```\n\n如果删除元素后不用保持原来顺序\n\n```go\nfunc remove(slice []int, i int) []int {\n    slice[i] = slice[len(slice)-1]\n    return slice[:len(slice)-1]\n}\nfunc main() {\n    s := []int{5, 6, 7, 8, 9}\n    fmt.Println(remove(s, 2)) // \"[5 6 9 8]\n}\n```\n"}]}},"page":"/[...param]","query":{"param":["data-type","array"]},"buildId":"RObeKJT4O3UiGUggjQU3r","assetPrefix":"/comparison-note","nextExport":true,"isFallback":false,"gip":true}</script><script nomodule="" src="/comparison-note/_next/static/chunks/polyfills-7258ef49cf482e03ae9c.js"></script><script src="/comparison-note/_next/static/chunks/main-ef5a94dd87cceb069c5d.js" async=""></script><script src="/co
