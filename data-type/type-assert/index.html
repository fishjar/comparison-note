"}},"readme":{"title":"数据类型判断","fullPath":"/data-type/type-assert/README.md"},"cards":[{"name":"dart.md","baseName":"dart","extName":".md","fullPath":"/data-type/type-assert/dart.md"},{"name":"go.md","baseName":"go","extName":".md","fullPath":"/data-type/type-assert/go.md"},{"name":"js.md","baseName":"js","extName":".md","fullPath":"/data-type/type-assert/js.md"},{"name":"python.md","baseName":"python","extName":".md","fullPath":"/data-type/type-assert/python.md"}],"nodes":[{"name":"check-if-the-same-object","fullPath":"/data-type/type-assert/check-if-the-same-object","asPath":"/data-type/type-assert/check-if-the-same-object","id":"%2Fdata-type%2Ftype-assert%2Fcheck-if-the-same-object","parent":{"name":"type-assert","fullPath":"/data-type/type-assert","asPath":"/data-type/type-assert","id":"%2Fdata-type%2Ftype-assert","readme":{"title":"数据类型判断","fullPath":"/data-type/type-assert/README.md"}},"readme":{"title":"检查两个引用是否指向同一个对象(内存地址)","fullPath":"/data-type/type-assert/check-if-the-same-object/README.md"},"cards":[{"name":"dart.md","baseName":"dart","extName":".md","fullPath":"/data-type/type-assert/check-if-the-same-object/dart.md"},{"name":"js.md","baseName":"js","extName":".md","fullPath":"/data-type/type-assert/check-if-the-same-object/js.md"}],"nodes":[]}]},"content":"","cards":[{"name":"dart.md","baseName":"dart","extName":".md","fullPath":"/data-type/type-assert/dart.md","content":"```dart\n// as 类型转换\n// is 如果对象是指定的类型返回 True\n// is! 如果对象是指定的类型返回 False\n\nif (emp is Person) { // Type check\n  emp.firstName = 'Bob';\n}\n// 使用 as 操作符可以简化上面的代码：\n(emp as Person).firstName = 'Bob';\n\n// 可以使用 Object 的 runtimeType 属性来判断实例 的类型，\n// 该属性 返回一个 Type 对象。\nvar msg = 'false';\nprint('The type of a is ${msg.runtimeType}');\n\n// 其他方式\nimport 'dart:mirrors';\ngetTypeName(dynamic obj) {\n  return reflect(obj).type.reflectedType.toString();\n}\n```\n"},{"name":"go.md","baseName":"go","extName":".md","fullPath":"/data-type/type-assert/go.md","content":"```go\n// reflect.Type 接口是满足 fmt.Stringer 接口的\nt := reflect.TypeOf(3)  // a reflect.Type\nfmt.Println(t.String()) // \"int\"\nfmt.Println(t)          // \"int\"\nfmt.Printf(\"%T\\n\", 3)   // \"int\"\n\n// 表达接口类型的 reflect.Type\nvar w io.Writer = os.Stdout\nfmt.Println(reflect.TypeOf(w)) // \"*os.File\"\n\n\n// fmt.Printf 提供了一个缩写 %T 参数，\n// 内部使用 reflect.TypeOf 来输出\n// 可以通过%T参数打印类型信息\nconst noDelay time.Duration = 0\nconst timeout = 5 * time.Minute\nfmt.Printf(\"%T %[1]v\\n\", noDelay)     // \"time.Duration 0\"\nfmt.Printf(\"%T %[1]v\\n\", timeout)     // \"time.Duration 5m0s\"\nfmt.Printf(\"%T %[1]v\\n\", time.Minute) // \"time.Duration 1m0s\"\n\nfmt.Printf(\"%T\\n\", 0)      // \"int\"\nfmt.Printf(\"%T\\n\", 0.0)    // \"float64\"\nfmt.Printf(\"%T\\n\", 0i)     // \"complex128\"\nfmt.Printf(\"%T\\n\", '\\000') // \"int32\" (rune)\n\n\nvar t interface{}\nt = functionOfSomeType()\nswitch t := t.(type) {\n  default:\n    fmt.Printf(\"unexpected type %T\", t)       // %T 输出 t 是什么类型\n  case bool:\n    fmt.Printf(\"boolean %t\\n\", t)             // t 是 bool 类型\n  case int:\n    fmt.Printf(\"integer %d\\n\", t)             // t 是 int 类型\n  case *bool:\n    fmt.Printf(\"pointer to boolean %t\\n\", *t) // t 是 *bool 类型\n  case *int:\n    fmt.Printf(\"pointer to integer %d\\n\", *t) // t 是 *int 类型\n}\n```\n\n```go\npackage main\nimport (\n  \"fmt\"\n  \"strconv\"\n)\ntype Element interface{}\ntype List [] Element\ntype Person struct {\n    name string\n    age int\n}\n//定义了String方法，实现了fmt.Stringer\nfunc (p Person) String() string {\n  return \"(name: \" + p.name + \" - age: \"+strconv.Itoa(p.age)+ \" years)\"\n}\nfunc main() {\n  list := make(List, 3)\n  list[0] = 1 // an int\n  list[1] = \"Hello\" // a string\n  list[2] = Person{\"Dennis\", 70}\n  // for index, element := range list {\n  //   if value, ok := element.(int); ok {\n  //     fmt.Printf(\"list[%d] is an int and its value is %d\\n\", index, value)\n  //   } else if value, ok := element.(string); ok {\n  //     fmt.Printf(\"list[%d] is a string and its value is %s\\n\", index, value)\n  //   } else if value, ok := element.(Person); ok {\n  //     fmt.Printf(\"list[%d] is a Person and its value is %s\\n\", index, value)\n  //   } else {\n  //     fmt.Printf(\"list[%d] is of a different type\\n\", index)\n  //   }\n  // }\n  for index, element := range list{\n    switch value := element.(type) {\n      case int:\n        fmt.Printf(\"list[%d] is an int and its value is %d\\n\", index, value)\n      case string:\n        fmt.Printf(\"list[%d] is a string and its value is %s\\n\", index, value)\n      case Person:\n        fmt.Printf(\"list[%d] is a Person and its value is %s\\n\", index, value)\n      default:\n        fmt.Println(\"list[%d] is of a different type\", index)\n    }\n  }\n}\n```\n\n使用 `reflect.Type` 来打印任意值的类型和枚举它的方法：\n\n```go\n// Print prints the method set of the value x.\nfunc Print(x interface{}) {\n    v := reflect.ValueOf(x)\n    t := v.Type()\n    fmt.Printf(\"type %s\\n\", t)\n\n    for i := 0; i \u003c v.NumMethod(); i++ {\n        methType := v.Method(i).Type()\n        fmt.Printf(\"func (%s) %s%s\\n\", t, t.Method(i).Name,\n            strings.TrimPrefix(methType.String(), \"func\"))\n    }\n}\n```\n"},{"name":"js.md","baseName":"js","extName":".md","fullPath":"/data-type/type-assert/js.md","content":"```js\ntypeof undefined; // undefined\ntypeof []; // object\ntypeof \"123\"; // string\ntypeof null; // object\n\n// instanceof运算符返回一个布尔值，表示对象是否为某个构造函数的实例。\nconst s = new String(\"123\");\ns instanceof String; // true\ns instanceof Object; // true\n\nv instanceof Vehicle;\n// 等同于\nVehicle.prototype.isPrototypeOf(v);\n\nObject.prototype.toString.call(2); // \"[object Number]\"\nObject.prototype.toString.call(\"\"); // \"[object String]\"\nObject.prototype.toString.call(true); // \"[object Boolean]\"\nObject.prototype.toString.call(undefined); // \"[object Undefined]\"\nObject.prototype.toString.call(null); // \"[object Null]\"\nObject.prototype.toString.call(Math); // \"[object Math]\"\nObject.prototype.toString.call({}); // \"[object Object]\"\nObject.prototype.toString.call([]); // \"[object Array]\"\n\nvar type = function(o) {\n  var s = Object.prototype.toString.call(o);\n  return s.match(/\\[object (.*?)\\]/)[1].toLowerCase();\n};\ntype({}); // \"object\"\ntype([]); // \"array\"\ntype(5); // \"number\"\ntype(null); // \"null\"\ntype(); // \"undefined\"\ntype(/abcd/); // \"regex\"\ntype(new Date()); // \"date\"\n\n[\n  \"Null\",\n  \"Undefined\",\n  \"Object\",\n  \"Array\",\n  \"String\",\n  \"Number\",\n  \"Boolean\",\n  \"Function\",\n  \"RegExp\",\n].forEach(function(t) {\n  type[\"is\" + t] = function(o) {\n    return type(o) === t.toLowerCase();\n  };\n});\ntype.isObject({}); // true\ntype.isNumber(NaN); // true\ntype.isRegExp(/abc/); // true\n\nfunction type(obj) {\n  return Reflect.apply(Object.prototype.toString, obj, [])\n    .replace(/^\\[object\\s(\\w+)\\]$/, \"$1\")\n    .toLowerCase();\n}\ntype(new String(\"123\")); // string\n```\n"},{"name":"python.md","baseName":"python","extName":".md","fullPath":"/data-type/type-assert/python.md","content":"```python\nimport types\ntype(myInt) is types.IntType\ntype(myInt) is type(1)\nisinstance(myInt, int)\n```\n"}]}},"page":"/[...param]","query":{"param":["data-type","type-assert"]},"buildId":"RObeKJT4O3UiGUggjQU3r","assetPrefix":"/comparison-note","nextExport":true,"isFallback":false,"gip":true}</script><script nomodule="" src="/comparison-note/_next/static/chunks/polyfills-7258ef49cf482e03ae9c.js"></script><script src="/comparison-note/_next/static/chunks/main-ef5a94dd87cceb069c5d.js" async=""></script><script src="/comparison-note/_next/static/chunks/webpack-e067438c4cf4ef2ef178.js" async=""></script><script src="/comparison-note/_next/static/chunks/framework.c7b20b4e446c7cca89e7.js" async=""></script><script src="/comparison-note/_next/static/chunks/468453da.ff5578978733a40a67a3.js" async=""></script><script src="/comparison-note/_next/static/chunks/commons.f60438d04fdb9e3a3273.js"
